name: digi_sampatti
description: DigiSampatti — India's Property Legal Verification App. Instant land record check, AI risk analysis, and due diligence reports.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # HTTP & Networking
  dio: ^5.4.1
  http: ^1.2.0

  # Camera & Media
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  image: ^4.1.7

  # GPS & Maps
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  google_maps_flutter: ^2.6.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Local Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path: ^1.9.0

  # PDF Generation
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.2

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8

  # UI Components
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  percent_indicator: ^4.2.3
  lottie: ^3.1.0

  url_launcher: ^6.2.5

  # Permissions
  permission_handler: ^11.3.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  logger: ^2.2.0
  connectivity_plus: ^6.0.2
  package_info_plus: ^8.0.0
  flutter_dotenv: ^5.1.0

  # Payments
  razorpay_flutter: ^1.3.6

  # File handling
  file_picker: ^8.0.3
  open_file: ^3.3.2
  share_plus: ^9.0.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - .env
